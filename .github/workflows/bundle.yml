name: Rebuild bundle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'
      - 'README.md'
      - '.github/**'

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Build bundle
        run: make bundle

      - name: Commit if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/install-buddy.tar.gz
          if git diff --cached --quiet; then
            echo "Bundle unchanged."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "[ci] Rebuild dist/install-buddy.tar.gz"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Bump version and tag
        id: bump
        if: steps.commit.outputs.changed == 'true'
        run: |
          git fetch --tags
          LATEST=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -n1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "Next version: $NEXT"
          echo "next_version=$NEXT" >> $GITHUB_OUTPUT
          git tag "$NEXT"
          git push origin "$NEXT"

      - name: Create GitHub Release
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.next_version }}" \
            dist/install-buddy.tar.gz \
            --title "${{ steps.bump.outputs.next_version }}" \
            --generate-notes
